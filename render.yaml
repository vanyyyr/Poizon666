services:
  - type: web
    name: poizon-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: poizon-db
          property: connectionString

databases:
  - name: poizon-db
    databaseName: poizon
    user: poizon_user
